# 다크 심리학 — 두 번째 채널 + YOUTUBE_REFRESH_TOKEN_PSYCHOLOGY 준비되면 아래 schedule 주석 해제
name: Psychology Pipeline

on:
  # 토큰 없이 cron 켜 두면 API 비용만 나가고 업로드는 실패할 수 있음 → 자동 실행 비활성화
  # 준비되면 주석 해제: 매일 UTC 13:00 (KST 22:00)
  # schedule:
  #   - cron: '0 13 * * *'
  workflow_dispatch:

concurrency:
  group: pipeline-psychology
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN_PSYCHOLOGY: ${{ secrets.YOUTUBE_REFRESH_TOKEN_PSYCHOLOGY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run psychology pipeline (1 video)
        run: node src/index.js --run-daily --genre=psychology --count=1
