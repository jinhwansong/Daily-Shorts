# 다크 심리학 — 매일 UTC 13:00 (한국 22:00 / 미국 동부 09:00)
name: Psychology Pipeline

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

concurrency:
  group: pipeline-psychology
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN_PSYCHOLOGY: ${{ secrets.YOUTUBE_REFRESH_TOKEN_PSYCHOLOGY }}

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run psychology pipeline (1 video)
        run: node src/index.js --run-daily --genre=psychology --count=1
